<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Soccer Open Play Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FullCalendar JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .fc { --fc-border-color: #334155; --fc-page-bg-color: #1e293b; color: #f8fafc; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid #334155; }
        .fc-day-today { background-color: #0f172a !important; }
        .fc-button-primary { background-color: #059669 !important; border-color: #059669 !important; }

</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-emerald-600 p-4 sticky top-0 shadow-lg z-10 flex flex-col sm:flex-row justify-between items-center gap-3">
        <div class="flex flex-col items-center sm:items-start gap-1">
            <h1 id="secretAdminTrigger" onclick="handleSecretClick()" class="text-xl font-bold flex items-center gap-2 cursor-pointer select-none">

            </h1>
            <div id="syncStatus" class="text-[10px] font-semibold"></div>

        <div class="flex items-center gap-3">
            <nav class="flex bg-emerald-700/50 p-1 rounded-lg text-xs font-semibold">

                <button onclick="switchView('organizers')" id="tab-organizers" class="px-3 py-1.5 rounded-md text-emerald-100 hover:text-white transition">主催者一覧</button>

            <button onclick="openModal('addModal')" class="bg-white text-emerald-600 px-3 py-1.5 rounded-full text-xs font-semibold shadow flex items-center gap-1 hover:bg-emerald-50">
                <i class="fa-solid fa-plus"></i> スケジュール追加
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- 管理者用承認セクション -->
        <div id="pendingSection" class="mb-6 bg-slate-800 border border-amber-500/50 rounded-xl p-4 hidden space-y-4">
            <div>
                <h2 class="text-base font-bold text-amber-400 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-bell"></i> 承認待ちのスケジュール (<span id="pendingCount">0</span>)
                </h2>
                <div id="pendingList" class="space-y-3"></div>
            </div>
            <div id="pendingOrganizerSection" class="border-t border-slate-700/60 pt-4">
                <h2 class="text-base font-bold text-amber-400 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-users-gear"></i> 承認待ちの主催者申請 (<span id="pendingOrganizerCount">0</span>)
                </h2>
                <div id="pendingOrganizerList" class="space-y-3"></div>
            </div>

        <!-- カレンダー表示 -->
        <div id="view-calendar" class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl relative">
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/80 rounded-xl flex flex-col items-center justify-center gap-3 z-10 hidden">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-emerald-500"></i>
                <p class="text-xs text-slate-300">データをクラウドから同期中...</p>
            </div>
            <div id="calendar"></div>
        </div>

        <!-- 主催者一覧表示 -->
        <div id="view-organizers" class="hidden space-y-4">
            <div id="adminLocationManager" class="hidden bg-slate-800 p-5 rounded-xl border border-rose-500/30 shadow-xl mb-6">
                <h2 class="text-lg font-bold text-rose-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-map-location-dot"></i> 登録済みの場所の管理 (Admin)
                </h2>
                <div id="location-admin-list" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-bold text-emerald-400 mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-users"></i> オープンプレー主催者一覧
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="organizers-list"></div>
                <div class="mt-8 pt-6 border-t border-slate-700/60 flex flex-col items-center text-center gap-3">
                    <button onclick="openOrganizerModalWithPreview()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs px-4 py-2 rounded-full transition shadow flex items-center gap-1.5 mt-1">
                        <i class="fa-solid fa-file-signature"></i> コミュニティの登録申請はこちら
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-amber-500/10 border border-amber-500/30 text-amber-200 rounded-xl p-4 flex gap-3 items-start text-xs leading-relaxed">
            <i class="fa-solid fa-triangle-exclamation text-amber-400 text-base mt-0.5 shrink-0"></i>
            <div>
                <strong class="text-amber-400 font-bold block mb-0.5">【免責事項】</strong>
                掲載情報は有志の申請に基づきます。天候や主催者の都合により変更される場合があるため、必ず事前に公式リンクから最新情報をご確認ください。
            </div>
        </div>
    </main>

    <!-- スケジュール追加モーダル -->
    <div id="addModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 hidden z-20">
        <div class="bg-slate-800 w-full max-w-md rounded-xl p-5 border border-slate-700 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold"><i class="fa-solid fa-calendar-plus text-emerald-500"></i> スケジュールの申請</h3>
                <button onclick="closeModal('addModal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="addForm" class="space-y-3" onsubmit="handleFormSubmit(event)">
                <input type="text" id="formUser" placeholder="お名前" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none" required>
                <div class="flex rounded border border-slate-600 bg-slate-700 overflow-hidden focus-within:border-emerald-500">
                    <span class="bg-slate-600 text-slate-300 px-3 py-1.5 text-sm flex items-center">@</span>
                    <input type="text" id="formTelegram" placeholder="Telegramユーザー名" class="w-full bg-transparent px-2 py-1.5 text-sm outline-none" required>
                </div>
                <input type="password" id="formDeletePassword" placeholder="削除用パスワード (4桁以上)" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none" required>
                
                <div class="flex gap-4 text-sm py-1">
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="scheduleType" value="solo" checked onchange="toggleScheduleTypeField('solo')" class="accent-emerald-500"> 単発</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="scheduleType" value="recurring" onchange="toggleScheduleTypeField('recurring')" class="accent-emerald-500"> 毎週</label>
                </div>

                <div id="field-solo-date"><input type="date" id="formDate" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none"></div>
                <div id="field-recurring-days" class="hidden grid grid-cols-4 gap-2 text-xs bg-slate-900/40 p-3 rounded-lg border border-slate-700">
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="1"> 月</label>
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="2"> 火</label>
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="3"> 水</label>
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="4"> 木</label>
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="5"> 金</label>
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="6"> 土</label>
                    <label class="flex items-center gap-1"><input type="checkbox" name="formDays" value="0"> 日</label>
                </div>

                <div class="flex gap-2">
                    <select id="formStart" class="flex-1 bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required></select>
                    <select id="formEnd" class="flex-1 bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required></select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">ピッチ・詳細場所</label>
                    <select id="formLocationSelect" onchange="toggleCustomLocation(this.value, 'form')" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none mb-1"></select>
                    <input type="text" id="formLocationCustom" placeholder="新しいピッチ名を入力" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none hidden">
                </div>

                <input type="text" id="formHost" placeholder="主催者 / グループ名" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none" required>
                <input type="url" id="formLink" placeholder="Facebook リンクURL" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none" required>
                
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded shadow transition">スケジュールを申請する</button>
            </form>
        </div>
    </div>

    <!-- 主催者申請モーダル -->
    <div id="addOrganizerModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 hidden z-20">
        <div class="bg-slate-800 w-full max-w-md rounded-xl p-5 border border-slate-700 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">主催者登録の申請</h3>
                <button onclick="closeModal('addOrganizerModal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="addOrganizerForm" class="space-y-3" onsubmit="handleOrganizerFormSubmit(event)">
                <input type="text" id="orgFormUser" placeholder="担当者名" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required>
                <input type="text" id="orgFormTelegram" placeholder="Telegram (@不要)" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required>
                <input type="password" id="orgFormDeletePassword" placeholder="削除用パスワード" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required>
                <input type="text" id="orgFormName" placeholder="チーム名 / コミュニティ名" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required>
                <input type="url" id="orgFormLogo" placeholder="ロゴ画像URL (任意)" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none">
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">主な開催場所</label>
                    <select id="orgFormLocationSelect" onchange="toggleCustomLocation(this.value, 'org')" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none mb-1"></select>
                    <input type="text" id="orgFormLocationCustom" placeholder="新しい場所を入力" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm focus:border-emerald-500 outline-none hidden">
                </div>

                <textarea id="orgFormDesc" rows="3" placeholder="紹介文 (初心者歓迎など)" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required></textarea>
                <input type="url" id="orgFormLink" placeholder="公式リンクURL" class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1.5 text-sm outline-none" required>
                
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded shadow transition">主催者登録を申請する</button>
            </form>
        </div>
    </div>

    <!-- 詳細モーダル -->
    <div id="detailModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 hidden z-20">
        <div class="bg-slate-800 w-full max-w-sm rounded-xl p-5 border border-slate-700">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-base font-bold text-emerald-400" id="detailHost"></h3>
                <button onclick="closeModal('detailModal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-2 text-sm mb-4">
                <p><i class="fa-regular fa-calendar mr-2 text-slate-400"></i><span id="detailDate"></span></p>
                <p><i class="fa-regular fa-clock mr-2 text-slate-400"></i><span id="detailTime"></span></p>
                <p><i class="fa-solid fa-location-dot mr-2 text-rose-500"></i><span id="detailLocation"></span></p>
                <p class="text-xs text-slate-400"><i class="fa-solid fa-user mr-2"></i>情報提供: <span id="detailAuthor"></span></p>
            </div>
            <div class="flex gap-2">
                <a id="detailFbLink" href="#" target="_blank" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white text-center py-2 rounded-lg text-xs font-bold">公式リンクを開く</a>
                <button id="adminDeleteBtn" onclick="handleDelete()" class="bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white px-3 rounded-lg text-xs font-bold hidden">削除</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "a";
        const MY_TELEGRAM_CHAT_ID = "5303710039"; 
        const TG_BOT_TOKEN = "8802205942:AAHmef91eZ_2RTXQIn0CC1k7u6UvntiGDjA";

        // ※ PCとスマホで同期するには、必ず有効なFirebase設定を入力してください
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        let events = [], locations = [], organizers = [];
        let db = null, isCloudMode = false, isAdmin = false, calendar = null;
        let selectedEventId = null, selectedEventDate = null, clickCount = 0;

        async function hashPassword(p) {
            const encoder = new TextEncoder();
            const data = encoder.encode(p);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                events: (info, success) => success(events.filter(e => e.extendedProps?.status === 'approved')),
                eventDidMount: (info) => {
                    const ex = info.event.extendedProps.exceptions || [];
                    const d = FullCalendar.formatDate(info.event.start, {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '-');
                    if (ex.includes(d)) info.el.style.display = 'none';
                },
                eventClick: (info) => openDetailModal(info.event)
            });
            calendar.render();
            generateTimeOptions();
            initSyncBackend();
        });

        function initSyncBackend() {
            const statusEl = document.getElementById('syncStatus');
            if (firebaseConfig.apiKey && firebaseConfig.projectId) {
                try {
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    isCloudMode = true;
                    statusEl.innerHTML = `<span class="text-emerald-400"><i class="fa-solid fa-cloud"></i> クラウド同期モード</span>`;
                    startRealtimeSync();
                } catch (e) {
                    console.error(e);
                    fallbackToLocal();
                }
            } else {
                fallbackToLocal();
            }
        }

        function fallbackToLocal() {
            isCloudMode = false;
            document.getElementById('syncStatus').innerHTML = `<span class="text-amber-400"><i class="fa-solid fa-hard-drive"></i> ローカル保存モード (同期不可)</span>`;
            loadLocalData();
        }

        function startRealtimeSync() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            db.collection("events").onSnapshot(s => {
                events = s.docs.map(d => ({id: d.id, ...d.data()}));
                if (calendar) calendar.refetchEvents();
                updatePendingList();
                document.getElementById('loadingOverlay').classList.add('hidden');
            });

            db.collection("locations").doc("meta").onSnapshot(d => {
                locations = d.exists ? d.data().list : ["Turf BGC", "Circuit Makati", "McKinley Hill"];
                updateLocationSelect();
                renderLocationManager();
            });

            db.collection("organizers").onSnapshot(s => {
                organizers = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderOrganizers();
                updatePendingList();
            });
        }

        function loadLocalData() {
            events = JSON.parse(localStorage.getItem('soccer_events') || '[]');
            locations = JSON.parse(localStorage.getItem('soccer_locations') || '["Turf BGC"]');
            organizers = JSON.parse(localStorage.getItem('soccer_organizers') || '[]');
            refreshUIs();
        }

        function saveLocalData() {
            localStorage.setItem('soccer_events', JSON.stringify(events));
            localStorage.setItem('soccer_locations', JSON.stringify(locations));
            localStorage.setItem('soccer_organizers', JSON.stringify(organizers));
        }

        function refreshUIs() {
            if (calendar) calendar.refetchEvents();
            updatePendingList();
            renderOrganizers();
            updateLocationSelect();
            renderLocationManager();
        }

        function updateLocationSelect() {
            const sels = [
                { el: document.getElementById('formLocationSelect'), prefix: 'form' },
                { el: document.getElementById('orgFormLocationSelect'), prefix: 'org' }
            ];
            sels.forEach(item => {
                if (!item.el) return;
                const currentVal = item.el.value;
                item.el.innerHTML = '<option value="">-- 登録済みの場所から選択 --</option>' + 
                    locations.map(l => `<option value="${l}">${l}</option>`).join('') + 
                    '<option value="__custom__">+ 新しい場所を入力する</option>';
                if (currentVal) item.el.value = currentVal;
            });
        }

        function toggleCustomLocation(val, prefix) {
            const input = document.getElementById(prefix === 'org' ? 'orgFormLocationCustom' : 'formLocationCustom');
            if (val === '__custom__') {
                input.classList.remove('hidden');
                input.required = true;
            } else {
                input.classList.add('hidden');
                input.required = false;
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            let loc = document.getElementById('formLocationSelect').value;
            let isNew = false;
            if (loc === '__custom__') {
                loc = document.getElementById('formLocationCustom').value.trim();
                isNew = true;
            }
            if (!loc) return alert("場所を選択してください");

            const type = document.querySelector('input[name="scheduleType"]:checked').value;
            const host = document.getElementById('formHost').value;
            const pass = await hashPassword(document.getElementById('formDeletePassword').value);

            const data = {
                title: type === 'solo' ? `${host} (${loc})` : `【定期】${host} (${loc})`,
                extendedProps: {
                    host: host,
                    location: loc,
                    link: document.getElementById('formLink').value,
                    author: document.getElementById('formUser').value,
                    telegram: document.getElementById('formTelegram').value,
                    deletePassword: pass,
                    status: isAdmin ? "approved" : "pending",
                    isRecurring: type === 'recurring',
                    submittedAt: new Date().toLocaleString(),
                    exceptions: []
                }
            };

            if (type === 'solo') {
                const d = document.getElementById('formDate').value;
                data.start = `${d}T${document.getElementById('formStart').value}:00`;
                data.end = `${d}T${document.getElementById('formEnd').value}:00`;
            } else {
                data.daysOfWeek = Array.from(document.querySelectorAll('input[name="formDays"]:checked')).map(c => parseInt(c.value));
                data.startTime = `${document.getElementById('formStart').value}:00`;
                data.endTime = `${document.getElementById('formEnd').value}:00`;
                data.color = "#047857";
            }

            if (isCloudMode) {
                await db.collection("events").add(data);
                if (isNew && !locations.includes(loc)) {
                    locations.push(loc);
                    await db.collection("locations").doc("meta").set({list: locations});
                }
            } else {
                events.push({id: Date.now().toString(), ...data});
                if (isNew && !locations.includes(loc)) locations.push(loc);
                saveLocalData();
                refreshUIs();
            }
            closeModal('addModal');
            alert(isAdmin ? "追加しました" : "申請を受け付けました。管理者の承認をお待ちください。");
        }

        async function handleOrganizerFormSubmit(e) {
            e.preventDefault();
            let loc = document.getElementById('orgFormLocationSelect').value;
            let isNew = false;
            if (loc === '__custom__') {
                loc = document.getElementById('orgFormLocationCustom').value.trim();
                isNew = true;
            }
            if (!loc) return alert("場所を選択してください");

            const data = {
                name: document.getElementById('orgFormName').value,
                location: loc,
                desc: document.getElementById('orgFormDesc').value,
                link: document.getElementById('orgFormLink').value,
                logo: document.getElementById('orgFormLogo').value,
                author: document.getElementById('orgFormUser').value,
                telegram: document.getElementById('orgFormTelegram').value,
                deletePassword: await hashPassword(document.getElementById('orgFormDeletePassword').value),
                status: isAdmin ? "approved" : "pending"
            };

            if (isCloudMode) {
                await db.collection("organizers").add(data);
                if (isNew && !locations.includes(loc)) {
                    locations.push(loc);
                    await db.collection("locations").doc("meta").set({list: locations});
                }
            } else {
                organizers.push({id: Date.now().toString(), ...data});
                if (isNew && !locations.includes(loc)) locations.push(loc);
                saveLocalData();
                refreshUIs();
            }
            closeModal('addOrganizerModal');
            alert(isAdmin ? "登録しました" : "申請を受け付けました。");
        }

        function openDetailModal(e) {
            selectedEventId = e.id;
            selectedEventDate = FullCalendar.formatDate(e.start, {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '-');
            const p = e.extendedProps;
            document.getElementById('detailHost').innerText = p.host;
            document.getElementById('detailLocation').innerText = p.location;
            document.getElementById('detailDate').innerText = selectedEventDate;
            document.getElementById('detailTime').innerText = `${FullCalendar.formatDate(e.start, {hour:'2-digit', minute:'2-digit'})} - ${FullCalendar.formatDate(e.end, {hour:'2-digit', minute:'2-digit'})}`;
            document.getElementById('detailAuthor').innerText = p.author;
            document.getElementById('detailFbLink').href = p.link;
            document.getElementById('adminDeleteBtn').classList.toggle('hidden', !isAdmin && !p.deletePassword);
            openModal('detailModal');
        }

        async function handleDelete() {
            const ev = events.find(e => e.id === selectedEventId);
            if (!isAdmin) {
                const p = prompt("削除用パスワードを入力してください:");
                if (await hashPassword(p) !== ev.extendedProps.deletePassword) return alert("パスワードが違います");
            }
            
            if (ev.extendedProps.isRecurring) {
                const m = prompt("1: 今回のみ非表示, 2: 定期枠ごと削除");
                if (m === "1") {
                    const ex = ev.extendedProps.exceptions || [];
                    ex.push(selectedEventDate);
                    if (isCloudMode) await db.collection("events").doc(selectedEventId).update({"extendedProps.exceptions": ex});
                    else { ev.extendedProps.exceptions = ex; saveLocalData(); refreshUIs(); }
                } else if (m === "2") {
                    if (isCloudMode) await db.collection("events").doc(selectedEventId).delete();
                    else { events = events.filter(e => e.id !== selectedEventId); saveLocalData(); refreshUIs(); }
                }
            } else {
                if (isCloudMode) await db.collection("events").doc(selectedEventId).delete();
                else { events = events.filter(e => e.id !== selectedEventId); saveLocalData(); refreshUIs(); }
            }
            closeModal('detailModal');
        }

        function renderOrganizers() {
            const list = document.getElementById('organizers-list');
            list.innerHTML = organizers.filter(o => o.status === 'approved').map(o => `
                <div class="bg-slate-700/40 p-4 rounded-xl border border-slate-600 flex gap-3">
                    ${o.logo ? `<img src="${o.logo}" class="w-12 h-12 rounded-full object-cover">` : `<div class="w-12 h-12 rounded-full bg-emerald-600 flex items-center justify-center font-bold">${o.name[0]}</div>`}
                    <div class="flex-1">
                        <h3 class="font-bold text-emerald-400">${o.name}</h3>
                        <p class="text-[10px] text-rose-400 font-bold"><i class="fa-solid fa-location-dot"></i> ${o.location}</p>
                        <p class="text-xs text-slate-300 mt-1 line-clamp-2">${o.desc}</p>
                        <a href="${o.link}" target="_blank" class="inline-block mt-2 text-[10px] bg-emerald-600 px-2 py-1 rounded font-bold">公式リンク</a>
                    </div>
                </div>
            `).join('');
        }

        function updatePendingList() {
            const pEvents = events.filter(e => e.extendedProps.status === 'pending');
            const pOrgs = organizers.filter(o => o.status === 'pending');
            document.getElementById('pendingCount').innerText = pEvents.length;
            document.getElementById('pendingOrganizerCount').innerText = pOrgs.length;
            document.getElementById('pendingSection').classList.toggle('hidden', !isAdmin || (pEvents.length === 0 && pOrgs.length === 0));
            
            document.getElementById('pendingList').innerHTML = pEvents.map(e => `
                <div class="bg-slate-900 p-3 rounded-lg text-xs flex justify-between items-center border border-slate-700">
                    <div>
                        <p class="font-bold text-emerald-400">${e.extendedProps.host}</p>
                        <p class="text-slate-400">${e.extendedProps.location} | ${e.extendedProps.author}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveEvent('${e.id}')" class="bg-emerald-600 px-3 py-1 rounded font-bold">承認</button>
                        <button onclick="rejectEvent('${e.id}')" class="bg-rose-600/20 text-rose-400 px-3 py-1 rounded font-bold">却下</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('pendingOrganizerList').innerHTML = pOrgs.map(o => `
                <div class="bg-slate-900 p-3 rounded-lg text-xs flex justify-between items-center border border-slate-700">
                    <div>
                        <p class="font-bold text-emerald-400">${o.name}</p>
                        <p class="text-slate-400">${o.location} | ${o.author}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveOrg('${o.id}')" class="bg-emerald-600 px-3 py-1 rounded font-bold">承認</button>
                        <button onclick="rejectOrg('${o.id}')" class="bg-rose-600/20 text-rose-400 px-3 py-1 rounded font-bold">却下</button>
                    </div>
                </div>
            `).join('');
        }

        async function approveEvent(id) {
            if (isCloudMode) await db.collection("events").doc(id).update({"extendedProps.status": "approved"});
            else { events.find(e => e.id === id).extendedProps.status = "approved"; saveLocalData(); refreshUIs(); }
        }
        async function rejectEvent(id) {
            if (isCloudMode) await db.collection("events").doc(id).delete();
            else { events = events.filter(e => e.id !== id); saveLocalData(); refreshUIs(); }
        }
        async function approveOrg(id) {
            if (isCloudMode) await db.collection("organizers").doc(id).update({status: "approved"});
            else { organizers.find(o => o.id === id).status = "approved"; saveLocalData(); refreshUIs(); }
        }
        async function rejectOrg(id) {
            if (isCloudMode) await db.collection("organizers").doc(id).delete();
            else { organizers = organizers.filter(o => o.id !== id); saveLocalData(); refreshUIs(); }
        }

        function generateTimeOptions() {
            const start = document.getElementById('formStart'), end = document.getElementById('formEnd');
            for(let i=0; i<48; i++) {
                const h = Math.floor(i/2).toString().padStart(2,'0'), m = (i%2===0?'00':'30');
                const opt = `<option value="${h}:${m}">${h}:${m}</option>`;
                start.innerHTML += opt; end.innerHTML += opt;
            }
            start.value = "20:00"; end.value = "22:00";
        }

        function handleSecretClick() {
            if (++clickCount === 3) {
                if (prompt("管理者パスワード:") === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('adminIndicator').classList.remove('hidden');
                    document.getElementById('adminLocationManager').classList.remove('hidden');
                    refreshUIs();
                }
                clickCount = 0;
            }
        }

        function renderLocationManager() {
            document.getElementById('location-admin-list').innerHTML = locations.map(l => `
                <span class="bg-slate-700 px-2 py-1 rounded text-[10px] flex items-center gap-2 border border-slate-600">
                    ${l} <i class="fa-solid fa-xmark cursor-pointer text-rose-400" onclick="deleteLoc('${l}')"></i>
                </span>
            `).join('');
        }

        async function deleteLoc(l) {
            if (!confirm("この場所をリストから削除しますか？")) return;
            locations = locations.filter(x => x !== l);
            if (isCloudMode) await db.collection("locations").doc("meta").set({list: locations});
            else { saveLocalData(); refreshUIs(); }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function toggleScheduleTypeField(t) {
            document.getElementById('field-solo-date').classList.toggle('hidden', t!=='solo');
            document.getElementById('field-recurring-days').classList.toggle('hidden', t==='solo');
        }
        function switchView(v) {
            document.getElementById('view-calendar').classList.toggle('hidden', v!=='calendar');
            document.getElementById('view-organizers').classList.toggle('hidden', v==='calendar');
            document.getElementById('tab-calendar').className = v==='calendar' ? "px-3 py-1.5 rounded-md bg-slate-900 text-white transition" : "px-3 py-1.5 rounded-md text-emerald-100 hover:text-white transition";
            document.getElementById('tab-organizers').className = v==='organizers' ? "px-3 py-1.5 rounded-md bg-slate-900 text-white transition" : "px-3 py-1.5 rounded-md text-emerald-100 hover:text-white transition";
            if (v === 'calendar') calendar.updateSize();
        }
    </script>
</body>
</html>
